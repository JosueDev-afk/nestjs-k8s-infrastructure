name: terraform

on:
  pull_request:
    paths: ["modules/**", "live/**"]
  push:
    branches: [main]
    paths: ["modules/**", "live/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.x"

      - name: fmt
        run: terraform fmt -check -recursive

      - name: validate módulos y leaves
        run: |
          set -euo pipefail
          for dir in modules/aws/* modules/k8s-platform/* live/aws/*/*; do
            [ -f "$dir/main.tf" ] || continue
            echo "== $dir =="
            terraform -chdir="$dir" init -backend=false -input=false >/dev/null
            terraform -chdir="$dir" validate -no-color
          done

  # plan/apply reales: requieren OIDC hacia AWS (aws-actions/configure-aws-credentials)
  # y aprobación manual por environment de GitHub. Activar cuando exista la cuenta:
  #   environment: production  +  workflow_dispatch para apply
